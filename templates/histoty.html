<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="main-panel full">

    <div class="topbar">
        <div>
            <p class="muted">Chat History</p>
            <h1>{{ bot.title }}</h1>
        </div>

        <a class="primary-link" href="/dashboard/{{ bot_id }}">Back</a>
    </div>

    <div class="panel-card">
        {% if bot.chat_history %}
            {% for chat in bot.chat_history %}
                <div class="history-item">
                    <strong>Q: {{ chat.question }}</strong>
                    <p>A: {{ chat.answer }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p class="muted">No chat history yet.</p>
        {% endif %}
    </div>

</div>

</body>
</html>
