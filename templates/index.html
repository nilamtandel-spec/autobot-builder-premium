<!DOCTYPE html>
<html>
<head>
    <title>AutoBot Builder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <span class="logo">A</span>
        <span>AutoBot Builder</span>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
        <div class="badge">AI Website Chatbot Generator</div>

        <h1>Generate a chatbot for any website within minutes.</h1>

        <p>Enter a website URL and create chatbot instantly.</p>

        <!-- ✅ FIXED FORM -->
        <form action="/generate" method="POST">
            
            <label>Website URL</label>

            <div class="input-row">
                <input 
                    type="text" 
                    name="url" 
                    placeholder="https://example.com" 
                    required
                >

                <!-- IMPORTANT -->
                <button type="submit">Generate Chatbot</button>
            </div>

        </form>

    </div>
</section>

</body>
</html>
