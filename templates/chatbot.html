<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ bot.title }} Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="chat-body">

<div class="chat-shell">

    <div class="chat-header">
        <div>
            <h2>{{ bot.title }}</h2>
            <p>Website AI Assistant</p>
        </div>

        <a href="/dashboard/{{ bot_id }}">Dashboard</a>
    </div>

    <div id="chatBox" class="chat-box">
        <div class="message bot">
            Hello! I am your website assistant. Ask me anything about this website.
        </div>
    </div>

    <div class="chat-input">
        <input id="question" type="text" placeholder="Ask your question...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
const botId = "{{ bot_id }}";

function addMessage(text, type) {
    const box = document.getElementById("chatBox");
    const msg = document.createElement("div");

    msg.className = "message " + type;
    msg.innerText = text;

    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("question");
    const question = input.value.trim();

    if (!question) return;

    addMessage(question, "user");
    input.value = "";

    addMessage("Typing...", "bot loading");

    const response = await fetch(`/api/chat/${botId}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ question })
    });

    const data = await response.json();

    const loading = document.querySelector(".loading");
    if (loading) loading.remove();

    addMessage(data.answer, "bot");
}

document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
